server: http://rabbit-pentest-server:8000
runtime:
  max_workers: 2
  max_running_projects: 3
  max_project_workers: 2
  interval: 3
  healthcheck_timeout: 20
  prompt_group: default
tasks:
  bootstrap:
    timeout: 300
    conclude_timeout: 90
  reason:
    timeout: 300
    max_intents: 2
  explore:
    timeout: 300
    conclude_timeout: 90
container:
  image: ghcr.io/oritera/cairn-worker-container:latest
  network_mode: host
  completed_action: stop
  cap_add: []
  name_prefix: cairn-021-dispatch-
common_env:
  TSEC_SERVER_HOST: 10.0.0.44:8000
  TSEC_AGENT_TOKEN: xxx
workers:
- name: codex_gpt-5.5_1
  type: codex
  enabled: true
  task_types:
  - bootstrap
  - reason
  - explore
  max_running: 2
  priority: 0
  env:
    TSEC_SERVER_HOST: 10.0.0.44:8000
    TSEC_AGENT_TOKEN: xxx
    CODEX_MODEL: gpt-5.5
    CODEX_BASE_URL: 
    OPENAI_API_KEY: sk-
- name: codex_gpt-5.5_2
