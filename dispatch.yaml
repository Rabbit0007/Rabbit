server: http://rabbit-pentest-server:8000
runtime:
  max_workers: 8
  max_running_projects: 3
  max_project_workers: 4
  interval: 3
  healthcheck_timeout: 20
  prompt_group: default
tasks:
  bootstrap:
    timeout: 300
    conclude_timeout: 90
  reason:
    timeout: 300
    max_intents: 2
  explore:
    timeout: 300
    conclude_timeout: 90
container:
  image: ghcr.io/oritera/cairn-worker-container:latest
  network_mode: rabbit-pentest-net
  completed_action: stop
  name_prefix: rabbit-pentest-dispatch-
  startup_name_prefix: rabbit-pentest-startup-healthcheck-
  artifact_volume: null
  artifact_host_path: /Users/rabbit/Desktop/Rabbit/datas/cairn
  artifact_mount_path: /audit-data
  cap_add: []
common_env:
  TSEC_SERVER_HOST: 10.0.0.44:8000
  TSEC_AGENT_TOKEN: xxx
  HTTP_PROXY: http://host.docker.internal:18888
  HTTPS_PROXY: http://host.docker.internal:18888
  ALL_PROXY: http://host.docker.internal:18888
  http_proxy: http://host.docker.internal:18888
  https_proxy: http://host.docker.internal:18888
  all_proxy: http://host.docker.internal:18888
  NO_PROXY: localhost,127.0.0.1,host.docker.internal,rabbit-pentest-server,rabbit-pentest-dispatcher
  no_proxy: localhost,127.0.0.1,host.docker.internal,rabbit-pentest-server,rabbit-pentest-dispatcher
workers:
- name: claudecode_deepseek-v4-pro
  type: claudecode
  enabled: false
  task_types:
  - bootstrap
  - reason
  - explore
  max_running: 2
  priority: 0
  env:
    TSEC_SERVER_HOST: 10.0.0.44:8000
    TSEC_AGENT_TOKEN: xxx
    ANTHROPIC_MODEL: deepseek-v4-pro
